<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>numpy.uk</title>
  <meta name="description" content="numpy.uk — click to visit numpy.org" />
  <style>
    :root {
      --c1: #6d28d9; /* purple */
      --c2: #4f46e5; /* indigo */
      --c3: #2563eb; /* blue */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
      background-size: 200% 200%;
      animation: drift 18s ease infinite;
      overflow: hidden;
    }

    @keyframes drift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .word {
      font-size: clamp(3rem, 18vw, 11rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      transition: transform 0.25s ease, text-shadow 0.25s ease;
      text-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    }

    .word:hover,
    .word:focus-visible {
      transform: scale(1.06);
      text-shadow: 0 12px 60px rgba(0, 0, 0, 0.35);
      outline: none;
    }

    .word:active { transform: scale(0.98); }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.9rem, 3vw, 1.6rem);
    }

    .contact {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      padding: 0.55rem 1.4rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(6px);
      color: #ffffff;
      text-decoration: none;
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .contact:hover,
    .contact:focus-visible {
      background: rgba(255, 255, 255, 0.24);
      transform: scale(1.04);
      outline: none;
    }

    .contact-hint {
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .contact-email {
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="stack">
    <a class="word" href="https://numpy.org/" aria-label="Go to numpy.org">numpy</a>
    <a class="contact" href="mailto:ceo@numpy.uk" aria-label="Email ceo@numpy.uk">
      <span class="contact-hint">Reach me by email</span>
      <span class="contact-email">ceo@numpy.uk</span>
    </a>
  </div>
</body>
</html>
