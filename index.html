<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>numpy.uk</title>
  <meta name="description" content="numpy.uk — click to visit numpy.org" />
  <style>
    :root {
      --c1: #6d28d9; /* purple */
      --c2: #4f46e5; /* indigo */
      --c3: #2563eb; /* blue */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
      background-size: 200% 200%;
      animation: drift 18s ease infinite;
      overflow: hidden;
    }

    @keyframes drift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .word {
      font-size: clamp(3rem, 18vw, 11rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      transition: transform 0.25s ease, text-shadow 0.25s ease;
      text-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    }

    .word:hover,
    .word:focus-visible {
      transform: scale(1.06);
      text-shadow: 0 12px 60px rgba(0, 0, 0, 0.35);
      outline: none;
    }

    .word:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <a class="word" href="https://numpy.org/" aria-label="Go to numpy.org">numpy</a>
</body>
</html>
